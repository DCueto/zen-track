<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Material Symbols — Icon Browser</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,400;8..144,500;8..144,700&display=swap">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Sharp:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 0;
    background: var(--md-sys-color-surface);
    color: var(--md-sys-color-on-surface);
    font-family: var(--md-ref-typeface-plain);
  }

  /* ── Controls bar ── */
  .controls {
    display: flex; flex-wrap: wrap; align-items: center; gap: 12px;
    padding: 14px 16px;
    background: var(--md-sys-color-surface-container-low);
    border-bottom: 1px solid var(--md-sys-color-outline-variant);
    position: sticky; top: 0; z-index: 10;
  }
  .search {
    flex: 1; min-width: 180px; height: 40px;
    display: flex; align-items: center; gap: 10px;
    background: var(--md-sys-color-surface-container-high);
    border-radius: 9999px; padding: 0 14px;
  }
  .search span { font-size: 20px; color: var(--md-sys-color-on-surface-variant); line-height: 1; }
  .search input {
    border: none; outline: none; background: transparent;
    font: 400 14px/1 var(--md-ref-typeface-plain);
    color: var(--md-sys-color-on-surface); flex: 1;
  }
  .search input::placeholder { color: var(--md-sys-color-on-surface-variant); }

  .seg-group { display: flex; gap: 3px; }
  .seg {
    height: 34px; padding: 0 14px; border: 1px solid var(--md-sys-color-outline);
    background: transparent; color: var(--md-sys-color-on-surface-variant);
    font: 500 13px/1 var(--md-ref-typeface-plain); cursor: pointer;
    border-radius: 0;
    transition: background 100ms;
  }
  .seg:first-child { border-radius: 17px 0 0 17px; }
  .seg:last-child  { border-radius: 0 17px 17px 0; }
  .seg.on { background: var(--md-sys-color-secondary-container); color: var(--md-sys-color-on-secondary-container); border-color: transparent; }

  .ctrl { display: flex; align-items: center; gap: 8px; }
  .ctrl label { font: 500 12px/1 var(--md-ref-typeface-plain); color: var(--md-sys-color-on-surface-variant); text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; }
  .ctrl input[type=range] { width: 80px; accent-color: var(--md-sys-color-primary); }
  .ctrl .val { font: 500 12px/1 var(--md-ref-typeface-plain); color: var(--md-sys-color-primary); min-width: 28px; }

  /* ── Category chips ── */
  .cats { display: flex; flex-wrap: wrap; gap: 6px; padding: 10px 16px 4px; }
  .chip {
    height: 32px; padding: 0 14px; border: 1px solid var(--md-sys-color-outline-variant);
    background: transparent; color: var(--md-sys-color-on-surface-variant);
    font: 500 12px/1 var(--md-ref-typeface-plain); cursor: pointer;
    border-radius: 9999px;
    transition: background 100ms, color 100ms;
  }
  .chip.on { background: var(--md-sys-color-primary); color: var(--md-sys-color-on-primary); border-color: transparent; }

  /* ── Grid ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
    gap: 4px; padding: 12px 14px 24px;
  }
  .ic {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 6px; padding: 12px 4px 10px; border-radius: 12px; cursor: pointer;
    transition: background 100ms;
  }
  .ic:hover { background: var(--md-sys-color-surface-container-high); }
  .ic.selected { background: var(--md-sys-color-primary-container); color: var(--md-sys-color-on-primary-container); }
  .ic .glyph { line-height: 1; font-family: var(--current-font, "Material Symbols Outlined"); }
  .ic .name { font: 400 9px/1.2 var(--md-ref-typeface-plain); color: var(--md-sys-color-on-surface-variant); text-align: center; word-break: break-all; }
  .ic.selected .name { color: var(--md-sys-color-on-primary-container); }

  /* ── Detail panel ── */
  .detail {
    display: none; position: sticky; bottom: 0;
    background: var(--md-sys-color-surface-container-high);
    border-top: 1px solid var(--md-sys-color-outline-variant);
    padding: 16px 20px; gap: 20px; align-items: center;
    flex-wrap: wrap;
  }
  .detail.show { display: flex; }
  .big-icon { line-height: 1; font-family: var(--current-font, "Material Symbols Outlined"); }
  .detail-info { flex: 1; min-width: 160px; }
  .detail-info .dname { font: 500 16px/1.3 var(--md-ref-typeface-plain); margin-bottom: 4px; }
  .detail-info .dcat  { font: 400 12px/1.2 var(--md-ref-typeface-plain); color: var(--md-sys-color-on-surface-variant); text-transform: capitalize; margin-bottom: 10px; }
  .code-block {
    font: 400 12px/1.6 "Roboto Mono", monospace;
    background: var(--md-sys-color-surface-container);
    color: var(--md-sys-color-primary);
    border-radius: 8px; padding: 8px 12px;
    white-space: pre; overflow-x: auto;
    max-width: 100%;
  }
  .empty { padding: 40px 20px; text-align: center; color: var(--md-sys-color-on-surface-variant); font: 400 14px/1.5 var(--md-ref-typeface-plain); }
  .count { font: 400 12px/1 var(--md-ref-typeface-plain); color: var(--md-sys-color-on-surface-variant); white-space: nowrap; }
</style>
</head>
<body>

<div class="controls">
  <div class="search">
    <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 20">search</span>
    <input id="q" type="text" placeholder="Search icons…" oninput="render()">
  </div>

  <div class="seg-group" id="style-group">
    <button class="seg on" data-font="Material Symbols Outlined" onclick="setStyle(this)">Outlined</button>
    <button class="seg" data-font="Material Symbols Rounded" onclick="setStyle(this)">Rounded</button>
    <button class="seg" data-font="Material Symbols Sharp" onclick="setStyle(this)">Sharp</button>
  </div>

  <div class="ctrl"><label>Size</label><input type="range" id="sz" min="20" max="48" value="24" step="4" oninput="updateAxes()"><span class="val" id="sz-val">24</span></div>
  <div class="ctrl"><label>Weight</label><input type="range" id="wt" min="100" max="700" value="400" step="100" oninput="updateAxes()"><span class="val" id="wt-val">400</span></div>
  <div class="ctrl"><label>Fill</label><input type="range" id="fi" min="0" max="1" value="0" step="1" oninput="updateAxes()"><span class="val" id="fi-val">0</span></div>
  <div class="ctrl"><label>Grade</label><input type="range" id="gr" min="-50" max="200" value="0" step="50" oninput="updateAxes()"><span class="val" id="gr-val">0</span></div>

  <span class="count" id="count"></span>
</div>

<div class="cats" id="cats"></div>
<div class="grid" id="grid"></div>
<div class="detail" id="detail">
  <div class="big-icon" id="big-icon">home</div>
  <div class="detail-info">
    <div class="dname" id="dname">home</div>
    <div class="dcat" id="dcat"></div>
    <pre class="code-block" id="dcode"></pre>
  </div>
</div>

let currentFont = "Material Symbols Outlined";
let selectedIcon = null;
let currentCat = "All";

function setStyle(btn) {
  document.querySelectorAll('.seg').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  currentFont = btn.dataset.font;
  document.documentElement.style.setProperty('--current-font', `"${currentFont}"`);
  render();
}

function updateAxes() {
  const sz = document.getElementById('sz').value;
  const wt = document.getElementById('wt').value;
  const fi = document.getElementById('fi').value;
  const gr = document.getElementById('gr').value;
  document.getElementById('sz-val').textContent = sz;
  document.getElementById('wt-val').textContent = wt;
  document.getElementById('fi-val').textContent = fi;
  document.getElementById('gr-val').textContent = gr;
  const vs = `'FILL' ${fi},'wght' ${wt},'GRAD' ${gr},'opsz' ${sz}`;
  document.querySelectorAll('.glyph, .big-icon').forEach(el => {
    el.style.fontVariationSettings = vs;
    el.style.fontSize = sz + 'px';
    el.style.fontFamily = `"${currentFont}"`;
  });
  if (selectedIcon) updateDetail(selectedIcon.name, selectedIcon.cat);
}

function updateDetail(name, cat) {
  const sz = document.getElementById('sz').value;
  const wt = document.getElementById('wt').value;
  const fi = document.getElementById('fi').value;
  const gr = document.getElementById('gr').value;
  const fontVar = currentFont.replace(/ /g, '+');
  document.getElementById('big-icon').textContent = name;
  document.getElementById('dname').textContent = name;
  document.getElementById('dcat').textContent = cat;
  document.getElementById('dcode').textContent =
    `<!-- HTML -->\n<span class="material-symbols-outlined">${name}</span>\n\n/* CSS axes */\nfont-variation-settings: 'FILL' ${fi}, 'wght' ${wt}, 'GRAD' ${gr}, 'opsz' ${sz};`;
  document.getElementById('detail').classList.add('show');
}

function selectIcon(el, name, cat) {
  document.querySelectorAll('.ic').forEach(i => i.classList.remove('selected'));
  el.classList.add('selected');
  selectedIcon = { name, cat };
  updateDetail(name, cat);
}

function render() {
  const q = document.getElementById('q').value.toLowerCase();
  const grid = document.getElementById('grid');
  const cats = Object.keys(ICONS);
  let html = '';
  let total = 0;

  const sz = document.getElementById('sz').value;
  const wt = document.getElementById('wt').value;
  const fi = document.getElementById('fi').value;
  const gr = document.getElementById('gr').value;
  const vs = `'FILL' ${fi},'wght' ${wt},'GRAD' ${gr},'opsz' ${sz}`;

  const activeCats = currentCat === 'All' ? cats : [currentCat];

  activeCats.forEach(cat => {
    ICONS[cat].forEach(name => {
      if (!q || name.includes(q)) {
        html += `<div class="ic" onclick="selectIcon(this,'${name}','${cat}')" title="${name}">
          <span class="glyph" style="font-family:'${currentFont}';font-size:${sz}px;font-variation-settings:${vs};line-height:1;">${name}</span>
          <span class="name">${name}</span>
        </div>`;
        total++;
      }
    });
  });

  grid.innerHTML = html || `<div class="empty" style="grid-column:1/-1">No icons match "${q}"</div>`;
  document.getElementById('count').textContent = total.toLocaleString() + ' icons';
}

function buildCats() {
  const div = document.getElementById('cats');
  const all = ['All', ...Object.keys(ICONS)];
  div.innerHTML = all.map(c =>
    `<button class="chip${c==='All'?' on':''}" onclick="setCat(this,'${c}')">${c}</button>`
  ).join('');
}

function setCat(btn, cat) {
  document.querySelectorAll('.chip').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  currentCat = cat;
  render();
}

buildCats();
render();
</script>
