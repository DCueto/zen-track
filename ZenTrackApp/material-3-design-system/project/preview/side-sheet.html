<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Side sheet</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,400;8..144,500&display=swap">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 14px 20px; }
  .shell {
    display: flex; width: 640px; height: 280px; border-radius: 16px; overflow: hidden;
    background: var(--md-sys-color-surface-container-low);
    box-shadow: var(--md-sys-elevation-level2);
  }
  .main { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
  .main h3 { margin: 0; font: 400 22px/1.3 var(--md-ref-typeface-brand); }
  .main p { margin: 0; font: 400 14px/1.5 var(--md-ref-typeface-plain); color: var(--md-sys-color-on-surface-variant); }
  .sheet {
    width: 240px; flex: 0 0 240px;
    background: var(--md-sys-color-surface-container);
    border-left: 1px solid var(--md-sys-color-outline-variant);
    padding: 16px; display: flex; flex-direction: column; gap: 12px;
  }
  .sheet .header {
    display: flex; align-items: center; justify-content: space-between;
    font: 500 16px/1 var(--md-ref-typeface-plain);
  }
  .close { width: 32px; height: 32px; border: none; background: transparent; cursor: pointer; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--md-sys-color-on-surface-variant); }
  .row2 { display: flex; flex-direction: column; gap: 8px; }
  .field {
    height: 48px; border-radius: 8px 8px 0 0; background: var(--md-sys-color-surface-container-highest);
    padding: 0 16px; display: flex; align-items: center;
    border-bottom: 1px solid var(--md-sys-color-primary);
    font: 400 14px/1 var(--md-ref-typeface-plain); color: var(--md-sys-color-on-surface);
  }
  .prop { display: flex; justify-content: space-between; align-items: center; font: 400 13px/1 var(--md-ref-typeface-plain); color: var(--md-sys-color-on-surface-variant); padding: 4px 0; }
  .val { font: 500 13px/1 var(--md-ref-typeface-plain); color: var(--md-sys-color-on-surface); }
</style>
</head>
<body>
  <div class="shell">
    <div class="main">
      <h3>Document title</h3>
      <p>This is the primary content area. The side sheet provides supporting info without leaving the screen.</p>
    </div>
    <div class="sheet">
      <div class="header">Properties<button class="close"><span class="material-symbols-outlined" style="font-size:18px;">close</span></button></div>
      <div class="field">My Document.docx</div>
      <div class="row2">
        <div class="prop">Owner<span class="val">Alex Smith</span></div>
        <div class="prop">Modified<span class="val">Today</span></div>
        <div class="prop">Size<span class="val">24 KB</span></div>
        <div class="prop">Type<span class="val">Document</span></div>
      </div>
    </div>
  </div>
</body>
</html>
