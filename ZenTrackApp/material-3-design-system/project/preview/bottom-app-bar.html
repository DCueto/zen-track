<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Bottom app bar / docked toolbar</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,400;8..144,500;8..144,700&display=swap">
<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 16px 20px; }
  .bar {
    display: flex; align-items: center; gap: 4px;
    width: 600px; max-width: 100%; height: 80px; padding: 0 4px;
    background: var(--md-sys-color-surface-container);
    color: var(--md-sys-color-on-surface);
  }
  .bar .icon {
    width: 56px; height: 56px; border: none; cursor: pointer;
    border-radius: 50%; background: transparent; color: var(--md-sys-color-on-surface-variant);
    display: inline-flex; align-items: center; justify-content: center;
  }
  .bar .icon:hover { background: var(--md-sys-color-surface-container-high); }
  .spacer { flex: 1; }
  .fab {
    width: 56px; height: 56px; border: none; cursor: pointer;
    border-radius: 16px;
    background: var(--md-sys-color-primary-container); color: var(--md-sys-color-on-primary-container);
    display: inline-flex; align-items: center; justify-content: center;
    margin-right: 12px;
  }
  /* docked toolbar (Expressive replacement) */
  .docked {
    display: inline-flex; gap: 4px; padding: 6px;
    background: var(--md-sys-color-surface-container);
    border-radius: var(--md-sys-shape-corner-full);
    box-shadow: var(--md-sys-elevation-level2);
  }
  .docked button { width: 48px; height: 48px; border: none; cursor: pointer; border-radius: 50%; background: transparent; color: var(--md-sys-color-on-surface); display: inline-flex; align-items: center; justify-content: center; }
  .docked .fab2 { background: var(--md-sys-color-primary); color: var(--md-sys-color-on-primary); border-radius: 16px; }
</style>
</head>
<body>
  <div class="col" style="gap:14px;">
    <div class="bar">
      <button class="icon"><span class="material-symbols-outlined">format_bold</span></button>
      <button class="icon"><span class="material-symbols-outlined">format_italic</span></button>
      <button class="icon"><span class="material-symbols-outlined">format_underlined</span></button>
      <button class="icon"><span class="material-symbols-outlined">attach_file</span></button>
      <span class="spacer"></span>
      <button class="fab"><span class="material-symbols-outlined">add</span></button>
    </div>
    <div class="docked">
      <button><span class="material-symbols-outlined">photo_camera</span></button>
      <button><span class="material-symbols-outlined">mic</span></button>
      <button><span class="material-symbols-outlined">attach_file</span></button>
      <button class="fab2"><span class="material-symbols-outlined">send</span></button>
    </div>
  </div>
</body>
</html>
