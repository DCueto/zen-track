<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Tooltip & badge</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,400;8..144,500;8..144,700&display=swap">
<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 18px 20px; }
  .anchor { position: relative; display: inline-flex; align-items: center; justify-content: center;
            width: 40px; height: 40px; color: var(--md-sys-color-on-surface-variant); }
  .badge {
    position: absolute; top: -2px; right: -2px;
    min-width: 16px; height: 16px; padding: 0 5px;
    background: var(--md-sys-color-error); color: var(--md-sys-color-on-error);
    border-radius: var(--md-sys-shape-corner-full);
    font: 500 11px/16px var(--md-ref-typeface-plain); text-align: center;
    box-sizing: border-box;
  }
  .dot { position: absolute; top: 4px; right: 4px; width: 8px; height: 8px; border-radius: 50%; background: var(--md-sys-color-error); }
  .tip {
    background: var(--md-sys-color-inverse-surface); color: var(--md-sys-color-inverse-on-surface);
    padding: 6px 10px; border-radius: 4px;
    font: 400 12px/1.4 var(--md-ref-typeface-plain);
  }
  .rich {
    background: var(--md-sys-color-inverse-surface); color: var(--md-sys-color-inverse-on-surface);
    padding: 12px 16px; border-radius: 12px; max-width: 240px;
    box-shadow: var(--md-sys-elevation-level2);
  }
  .rich h5 { margin: 0 0 4px; font: 500 14px/1.25 var(--md-ref-typeface-plain); }
  .rich p { margin: 0; font: 400 12px/1.4 var(--md-ref-typeface-plain); opacity: 0.85; }
</style>
</head>
<body>
  <div class="row" style="gap:24px;align-items:center;">
    <span class="lbl">Badges</span>
    <span class="anchor"><span class="material-symbols-outlined">notifications</span><span class="badge">3</span></span>
    <span class="anchor"><span class="material-symbols-outlined">mail</span><span class="badge">12</span></span>
    <span class="anchor"><span class="material-symbols-outlined">chat</span><span class="badge">99+</span></span>
    <span class="anchor"><span class="material-symbols-outlined">cloud</span><span class="dot"></span></span>
  </div>
  <div class="row" style="margin-top:16px;align-items:flex-start;gap:24px;">
    <span class="lbl" style="margin-top:6px;">Tooltips</span>
    <div class="tip">Add to favourites</div>
    <div class="rich">
      <h5>Refresh feed</h5>
      <p>Pull latest items from the server. Last refreshed 2 min ago.</p>
    </div>
  </div>
</body>
</html>
