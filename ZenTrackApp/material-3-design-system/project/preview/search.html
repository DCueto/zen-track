<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Search bar</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,400;8..144,500;8..144,700&display=swap">
<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .search {
    display: flex; align-items: center; gap: 12px;
    width: 540px; max-width: 100%; height: 56px; padding: 0 16px;
    background: var(--md-sys-color-surface-container-high);
    border-radius: var(--md-sys-shape-corner-full);
    box-shadow: var(--md-sys-elevation-level1);
  }
  .search .material-symbols-outlined { color: var(--md-sys-color-on-surface-variant); }
  .search input {
    flex: 1; border: none; outline: none; background: transparent;
    font: 400 16px/1.5 var(--md-ref-typeface-plain);
    color: var(--md-sys-color-on-surface);
  }
  .avatar {
    width: 30px; height: 30px; border-radius: 50%;
    background: linear-gradient(135deg, #B589F0 0%, #7956A8 100%);
    color: white; display: inline-flex; align-items: center; justify-content: center;
    font: 500 13px/1 var(--md-ref-typeface-plain);
  }
  .results {
    width: 540px; margin-top: 6px; background: var(--md-sys-color-surface-container-high);
    border-radius: 28px; padding: 8px 0; box-shadow: var(--md-sys-elevation-level2);
  }
  .res {
    display: flex; align-items: center; gap: 16px; padding: 10px 16px; cursor: pointer;
    font: 400 14px/1.25 var(--md-ref-typeface-plain);
  }
  .res:hover { background: var(--md-sys-color-surface-container-highest); }
  .res .material-symbols-outlined { color: var(--md-sys-color-on-surface-variant); }
</style>
</head>
<body>
  <div class="col">
    <div class="search">
      <span class="material-symbols-outlined">menu</span>
      <input value="material design" />
      <span class="material-symbols-outlined">mic</span>
      <div class="avatar">A</div>
    </div>
    <div class="results">
      <div class="res"><span class="material-symbols-outlined">history</span>material design 3</div>
      <div class="res"><span class="material-symbols-outlined">history</span>material design components</div>
      <div class="res"><span class="material-symbols-outlined">trending_up</span>material design icons</div>
    </div>
  </div>
</body>
</html>
