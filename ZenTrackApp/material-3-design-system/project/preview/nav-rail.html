<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Navigation rail</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,400;8..144,500&display=swap">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 16px 20px; }
  .rail {
    width: 80px; display: flex; flex-direction: column; align-items: center;
    padding: 16px 0; gap: 4px; background: var(--md-sys-color-surface);
    border-radius: 12px; border-right: 1px solid var(--md-sys-color-outline-variant);
    min-height: 280px;
  }
  .fab {
    width: 56px; height: 56px; border-radius: 16px; border: none; cursor: pointer;
    background: var(--md-sys-color-primary-container); color: var(--md-sys-color-on-primary-container);
    display: flex; align-items: center; justify-content: center; margin-bottom: 8px;
  }
  .item {
    display: flex; flex-direction: column; align-items: center; gap: 4px; width: 80px;
    padding: 4px 0; cursor: pointer; text-decoration: none;
    font: 500 12px/1 var(--md-ref-typeface-plain); color: var(--md-sys-color-on-surface-variant);
  }
  .pill {
    width: 56px; height: 32px; border-radius: 9999px;
    display: flex; align-items: center; justify-content: center; gap: 4px;
  }
  .item.on .pill { background: var(--md-sys-color-secondary-container); }
  .item.on { color: var(--md-sys-color-on-surface); }
  .item .material-symbols-outlined { font-size: 22px; color: var(--md-sys-color-on-surface-variant); }
  .item.on .material-symbols-outlined { font-variation-settings: 'FILL' 1; color: var(--md-sys-color-on-secondary-container); }
</style>
</head>
<body>
  <div class="rail">
    <button class="fab"><span class="material-symbols-outlined">edit</span></button>
    <div class="item on">
      <div class="pill"><span class="material-symbols-outlined">inbox</span></div>
      <span>Inbox</span>
    </div>
    <div class="item">
      <div class="pill"><span class="material-symbols-outlined">send</span></div>
      <span>Sent</span>
    </div>
    <div class="item">
      <div class="pill"><span class="material-symbols-outlined">drafts</span></div>
      <span>Drafts</span>
    </div>
    <div class="item">
      <div class="pill"><span class="material-symbols-outlined">star</span></div>
      <span>Starred</span>
    </div>
  </div>
</body>
</html>
