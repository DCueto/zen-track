<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--md-sys-color-surface); color: var(--md-sys-color-on-surface); }
  .row { display: flex; align-items: center; gap: 12px; padding: 4px 0; font: 500 12px/1 var(--md-ref-typeface-mono); }
  .row .name { width: 48px; color: var(--md-sys-color-on-surface-variant); }
  .row .val { width: 48px; }
  .bar { height: 12px; background: var(--md-sys-color-primary); border-radius: 2px; }
</style>
</head>
<body>
  <div class="row"><span class="name">1</span><span class="val">4px</span><span class="bar" style="width: 4px;"></span></div>
  <div class="row"><span class="name">2</span><span class="val">8px</span><span class="bar" style="width: 8px;"></span></div>
  <div class="row"><span class="name">3</span><span class="val">12px</span><span class="bar" style="width: 12px;"></span></div>
  <div class="row"><span class="name">4</span><span class="val">16px</span><span class="bar" style="width: 16px;"></span></div>
  <div class="row"><span class="name">5</span><span class="val">20px</span><span class="bar" style="width: 20px;"></span></div>
  <div class="row"><span class="name">6</span><span class="val">24px</span><span class="bar" style="width: 24px;"></span></div>
  <div class="row"><span class="name">8</span><span class="val">32px</span><span class="bar" style="width: 32px;"></span></div>
  <div class="row"><span class="name">10</span><span class="val">40px</span><span class="bar" style="width: 40px;"></span></div>
  <div class="row"><span class="name">12</span><span class="val">48px</span><span class="bar" style="width: 48px;"></span></div>
  <div class="row"><span class="name">16</span><span class="val">64px</span><span class="bar" style="width: 64px;"></span></div>
</body>
</html>
