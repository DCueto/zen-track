<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Button sizes (XS–XL)</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,400;8..144,500;8..144,700&display=swap">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    border: none; cursor: pointer;
    background: var(--md-sys-color-primary); color: var(--md-sys-color-on-primary);
    font-family: var(--md-ref-typeface-plain); font-weight: 500;
    border-radius: var(--md-sys-shape-corner-full);
    transition: border-radius var(--md-sys-motion-duration-short3) var(--md-sys-motion-spring-default-spatial);
  }
  .btn:active { border-radius: var(--md-sys-shape-corner-medium); }
  .b-xs { height: 32px; padding: 0 16px; font-size: 14px; }
  .b-s  { height: 40px; padding: 0 24px; font-size: 14px; }
  .b-m  { height: 56px; padding: 0 28px; font-size: 16px; }
  .b-l  { height: 96px; padding: 0 48px; font-size: 24px; border-radius: 28px; }
  .b-xl { height: 136px; padding: 0 64px; font-size: 32px; border-radius: 40px; }
  .b-l:active, .b-xl:active { border-radius: 16px; }
  .row { gap: 14px; align-items: flex-end; }
</style>
</head>
<body>
  <div class="row">
    <button class="btn b-xs">XS</button>
    <button class="btn b-s">Small</button>
    <button class="btn b-m">Medium</button>
    <button class="btn b-l">Large</button>
    <button class="btn b-xl">XL</button>
  </div>
</body>
</html>
