<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Loading indicator (shape morph)</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,400;8..144,500;8..144,700&display=swap">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .demo { display: inline-flex; align-items: center; justify-content: center; width: 96px; height: 96px; }
  .blob {
    width: 56px; height: 56px;
    background: var(--md-sys-color-primary);
    animation: morph 3.6s linear infinite;
  }
  @keyframes morph {
    0%   { border-radius: 28px;                     transform: rotate(0deg); }
    16%  { border-radius: 50% 14% 50% 14%;          transform: rotate(60deg); }
    33%  { border-radius: 14% 50% 14% 50%;          transform: rotate(120deg); }
    50%  { border-radius: 28px 8px 28px 8px;        transform: rotate(180deg); }
    66%  { border-radius: 8px 28px 8px 28px;        transform: rotate(240deg); }
    83%  { border-radius: 50%;                      transform: rotate(300deg); }
    100% { border-radius: 28px;                     transform: rotate(360deg); }
  }
  .ring {
    width: 56px; height: 56px; border-radius: 50%;
    border: 6px solid var(--md-sys-color-secondary-container);
    border-top-color: var(--md-sys-color-primary);
    animation: spin 1.2s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .bar {
    width: 220px; height: 4px; border-radius: 2px;
    background: var(--md-sys-color-surface-container-highest); position: relative; overflow: hidden;
  }
  .bar::after {
    content: ''; position: absolute; top: 0; left: -40%; width: 40%; height: 100%;
    background: var(--md-sys-color-primary); border-radius: 2px;
    animation: slide 1.6s var(--md-sys-motion-easing-emphasized) infinite;
  }
  @keyframes slide { to { left: 100%; } }
</style>
</head>
<body>
  <div class="row" style="gap:24px;">
    <div class="col" style="align-items:center;gap:6px;"><div class="demo"><div class="blob"></div></div><span class="lbl" style="width:auto;text-align:center;">Expressive</span></div>
    <div class="col" style="align-items:center;gap:6px;"><div class="demo"><div class="ring"></div></div><span class="lbl" style="width:auto;text-align:center;">Circular</span></div>
    <div class="col" style="align-items:center;gap:6px;"><div class="demo" style="width:240px;"><div class="bar"></div></div><span class="lbl" style="width:auto;text-align:center;">Linear</span></div>
  </div>
</body>
</html>
