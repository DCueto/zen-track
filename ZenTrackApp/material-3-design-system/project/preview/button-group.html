<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Button group</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,400;8..144,500;8..144,700&display=swap">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .group {
    display: inline-flex; gap: 4px;
    background: transparent;
  }
  .seg {
    height: 48px; padding: 0 22px; border: none; cursor: pointer;
    background: var(--md-sys-color-secondary-container); color: var(--md-sys-color-on-secondary-container);
    font-family: var(--md-ref-typeface-plain); font-weight: 500; font-size: 14px;
    border-radius: 12px;
    transition: background var(--md-sys-motion-duration-short3) var(--md-sys-motion-spring-default-effects),
                border-radius var(--md-sys-motion-duration-medium2) var(--md-sys-motion-spring-default-spatial);
  }
  .group .seg:first-child { border-top-left-radius: 24px; border-bottom-left-radius: 24px; }
  .group .seg:last-child  { border-top-right-radius: 24px; border-bottom-right-radius: 24px; }
  .seg.on {
    background: var(--md-sys-color-primary); color: var(--md-sys-color-on-primary);
    border-radius: 24px;
  }
  .connected { gap: 2px; }
  .connected .seg { border-radius: 6px; }
  .connected .seg:first-child { border-top-left-radius: 24px; border-bottom-left-radius: 24px; }
  .connected .seg:last-child  { border-top-right-radius: 24px; border-bottom-right-radius: 24px; }
  .connected .seg.on { border-radius: 18px; }
</style>
</head>
<body>
  <div class="row"><span class="lbl">Standard</span>
    <div class="group">
      <button class="seg on">Day</button>
      <button class="seg">Week</button>
      <button class="seg">Month</button>
      <button class="seg">Year</button>
    </div>
  </div>
  <div class="row"><span class="lbl">Connected</span>
    <div class="group connected">
      <button class="seg">Walk</button>
      <button class="seg on">Bike</button>
      <button class="seg">Drive</button>
    </div>
  </div>
</body>
</html>
