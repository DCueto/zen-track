<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Bottom sheet</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,400;8..144,500;8..144,700&display=swap">
<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 12px 20px; }
  .sheet {
    width: 380px; background: var(--md-sys-color-surface-container-low);
    border-radius: 28px 28px 0 0; padding: 12px 8px 16px;
    box-shadow: var(--md-sys-elevation-level3);
    color: var(--md-sys-color-on-surface);
  }
  .grab { width: 32px; height: 4px; border-radius: 2px; background: var(--md-sys-color-on-surface-variant); opacity: 0.4; margin: 0 auto 16px; }
  .sheet h4 { margin: 0 16px 8px; font: 500 16px/1.5 var(--md-ref-typeface-plain); }
  .item {
    display: flex; align-items: center; gap: 16px; padding: 12px 16px;
    border-radius: 12px; cursor: pointer;
  }
  .item:hover { background: var(--md-sys-color-surface-container); }
  .item .material-symbols-outlined { color: var(--md-sys-color-on-surface-variant); }
  .item .label { flex: 1; font: 400 16px/1.5 var(--md-ref-typeface-plain); }
</style>
</head>
<body>
  <div class="sheet">
    <div class="grab"></div>
    <h4>Share to</h4>
    <div class="item"><span class="material-symbols-outlined">link</span><span class="label">Copy link</span></div>
    <div class="item"><span class="material-symbols-outlined">mail</span><span class="label">Email</span></div>
    <div class="item"><span class="material-symbols-outlined">message</span><span class="label">Messages</span></div>
    <div class="item"><span class="material-symbols-outlined">cloud_upload</span><span class="label">Upload to Drive</span></div>
  </div>
</body>
</html>
