<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Time picker</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,400;8..144,500&display=swap">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 16px 20px; }
  .picker {
    width: 360px; background: var(--md-sys-color-surface-container-high);
    border-radius: 28px; padding: 20px 24px 16px;
    box-shadow: var(--md-sys-elevation-level3); color: var(--md-sys-color-on-surface);
  }
  .eyebrow { font: 500 11px/1 var(--md-ref-typeface-plain); letter-spacing: .06em; text-transform: uppercase; color: var(--md-sys-color-on-surface-variant); margin-bottom: 16px; }
  .fields { display: flex; align-items: center; gap: 4px; margin-bottom: 20px; }
  .field {
    flex: 1; height: 72px; border-radius: 8px;
    background: var(--md-sys-color-surface-container-highest);
    display: flex; align-items: center; justify-content: center;
    font: 400 57px/1 var(--md-ref-typeface-plain); letter-spacing: -0.25px;
    cursor: pointer;
  }
  .field.on { background: var(--md-sys-color-primary-container); color: var(--md-sys-color-on-primary-container); }
  .colon { font: 400 57px/1 var(--md-ref-typeface-plain); padding: 0 2px; }
  .ampm { display: flex; flex-direction: column; gap: 2px; }
  .ap {
    flex: 1; width: 52px; height: 34px; border-radius: 4px;
    border: 1px solid var(--md-sys-color-outline);
    display: flex; align-items: center; justify-content: center;
    font: 500 14px/1 var(--md-ref-typeface-plain); cursor: pointer;
    color: var(--md-sys-color-on-surface-variant);
  }
  .ap.on { background: var(--md-sys-color-tertiary-container); color: var(--md-sys-color-on-tertiary-container); border-color: transparent; }
  .actions { display: flex; justify-content: space-between; align-items: center; }
  .kbd { display: flex; align-items: center; gap: 4px; color: var(--md-sys-color-on-surface-variant); cursor: pointer; font: 500 14px/1 var(--md-ref-typeface-plain); }
  .btns { display: flex; gap: 4px; }
  .btns button { height: 40px; padding: 0 16px; border: none; background: transparent; color: var(--md-sys-color-primary); font: 500 14px/1 var(--md-ref-typeface-plain); cursor: pointer; border-radius: 9999px; }
</style>
</head>
<body>
  <div class="picker">
    <div class="eyebrow">Select time</div>
    <div class="fields">
      <div class="field on">09</div>
      <div class="colon">:</div>
      <div class="field">30</div>
      <div class="ampm">
        <div class="ap on">AM</div>
        <div class="ap">PM</div>
      </div>
    </div>
    <div class="actions">
      <div class="kbd"><span class="material-symbols-outlined" style="font-size:20px">keyboard</span></div>
      <div class="btns"><button>Cancel</button><button>OK</button></div>
    </div>
  </div>
</body>
</html>
