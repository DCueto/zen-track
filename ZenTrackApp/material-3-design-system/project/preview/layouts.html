<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Canonical layouts</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,400;8..144,500&display=swap">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 16px 20px; }
  .demo { border-radius: 12px; overflow: hidden; background: var(--md-sys-color-surface-container-low); }
  /* Feed */
  .feed { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; padding: 8px; }
  .card { border-radius: 8px; background: var(--md-sys-color-surface-container-highest); padding: 10px 12px; }
  .card .img { height: 40px; border-radius: 6px; background: var(--md-sys-color-primary-container); margin-bottom: 8px; }
  .card .line { height: 8px; border-radius: 4px; background: var(--md-sys-color-outline-variant); margin-bottom: 6px; }
  .card .line.short { width: 60%; }
  /* List-detail */
  .ld { display: flex; }
  .list { width: 120px; background: var(--md-sys-color-surface-container); padding: 6px; border-right: 1px solid var(--md-sys-color-outline-variant); }
  .li { padding: 8px; border-radius: 6px; margin-bottom: 4px; font: 400 11px/1.3 var(--md-ref-typeface-plain); color: var(--md-sys-color-on-surface-variant); }
  .li.on { background: var(--md-sys-color-secondary-container); color: var(--md-sys-color-on-secondary-container); font-weight: 500; }
  .detail { flex: 1; padding: 12px; }
  .detail .head { font: 500 14px/1.3 var(--md-ref-typeface-plain); margin-bottom: 6px; }
  .detail .body { font: 400 11px/1.5 var(--md-ref-typeface-plain); color: var(--md-sys-color-on-surface-variant); }
  /* Supporting pane */
  .sp { display: flex; gap: 0; }
  .primary { flex: 2; padding: 12px; }
  .primary .block { height: 60px; background: var(--md-sys-color-surface-container-highest); border-radius: 8px; margin-bottom: 8px; }
  .secondary { flex: 1; background: var(--md-sys-color-surface-container); padding: 12px; border-left: 1px solid var(--md-sys-color-outline-variant); }
  .secondary .row3 { display: flex; justify-content: space-between; margin-bottom: 8px; font: 500 11px/1 var(--md-ref-typeface-plain); color: var(--md-sys-color-on-surface-variant); }
  .secondary .val3 { font-weight: 500; color: var(--md-sys-color-on-surface); }
  .lbl2 { font: 500 11px/1 var(--md-ref-typeface-plain); letter-spacing: .04em; text-transform: uppercase; color: var(--md-sys-color-on-surface-variant); margin-bottom: 8px; }
</style>
</head>
<body>
  <div class="col" style="gap:14px;">
    <div><div class="lbl2">Feed</div>
      <div class="demo" style="width:500px;">
        <div class="feed">
          <div class="card"><div class="img"></div><div class="line"></div><div class="line short"></div></div>
          <div class="card"><div class="img"></div><div class="line"></div><div class="line short"></div></div>
          <div class="card"><div class="img"></div><div class="line"></div><div class="line short"></div></div>
          <div class="card"><div class="img"></div><div class="line"></div><div class="line short"></div></div>
          <div class="card"><div class="img"></div><div class="line"></div><div class="line short"></div></div>
          <div class="card"><div class="img"></div><div class="line"></div><div class="line short"></div></div>
        </div>
      </div>
    </div>
    <div><div class="lbl2">List–Detail</div>
      <div class="demo" style="width:500px;height:120px;">
        <div class="ld" style="height:100%;">
          <div class="list">
            <div class="li on">Inbox</div>
            <div class="li">Sent</div>
            <div class="li">Drafts</div>
            <div class="li">Starred</div>
          </div>
          <div class="detail">
            <div class="head">Meeting notes — Monday</div>
            <div class="body">Please review the attached notes from today's standup and provide feedback by end of week.</div>
          </div>
        </div>
      </div>
    </div>
    <div><div class="lbl2">Supporting Pane</div>
      <div class="demo" style="width:500px;">
        <div class="sp">
          <div class="primary"><div class="block"></div><div class="block" style="height:40px;"></div></div>
          <div class="secondary">
            <div class="row3">Owner<span class="val3">Alex S.</span></div>
            <div class="row3">Modified<span class="val3">Today</span></div>
            <div class="row3">Size<span class="val3">24 KB</span></div>
            <div class="row3">Status<span class="val3">Published</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
