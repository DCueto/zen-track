<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Date picker</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,400;8..144,500;8..144,700&display=swap">
<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 16px 20px; }
  .picker {
    width: 360px; background: var(--md-sys-color-surface-container-high);
    border-radius: 28px; padding: 16px 12px; box-shadow: var(--md-sys-elevation-level3);
    color: var(--md-sys-color-on-surface);
  }
  .head { padding: 8px 12px 16px; }
  .eyebrow { font: 500 11px/1 var(--md-ref-typeface-plain); letter-spacing: 0.06em; text-transform: uppercase; color: var(--md-sys-color-on-surface-variant); margin-bottom: 12px; }
  .date { font: 400 32px/1.2 var(--md-ref-typeface-brand); }
  .nav { display: flex; align-items: center; justify-content: space-between; padding: 4px 12px 8px; }
  .nav .month { font: 500 14px/1 var(--md-ref-typeface-plain); }
  .nav button { width: 36px; height: 36px; border: none; background: transparent; cursor: pointer; border-radius: 50%; color: var(--md-sys-color-on-surface-variant); display: inline-flex; align-items: center; justify-content: center; }
  .grid { display: grid; grid-template-columns: repeat(7, 40px); gap: 0; padding: 0 6px; justify-content: center; }
  .dow { width: 40px; height: 32px; display: inline-flex; align-items: center; justify-content: center; font: 500 12px/1 var(--md-ref-typeface-plain); color: var(--md-sys-color-on-surface-variant); }
  .day { width: 40px; height: 40px; display: inline-flex; align-items: center; justify-content: center; font: 400 14px/1 var(--md-ref-typeface-plain); cursor: pointer; border-radius: 50%; }
  .day.dim { color: var(--md-sys-color-on-surface-variant); opacity: 0.4; }
  .day.today { box-shadow: inset 0 0 0 1px var(--md-sys-color-primary); color: var(--md-sys-color-primary); }
  .day.sel { background: var(--md-sys-color-primary); color: var(--md-sys-color-on-primary); }
</style>
</head>
<body>
  <div class="picker">
    <div class="head">
      <div class="eyebrow">Select date</div>
      <div class="date">Tue, May 12</div>
    </div>
    <div class="nav">
      <span class="month">May 2026</span>
      <div>
        <button><span class="material-symbols-outlined">chevron_left</span></button>
        <button><span class="material-symbols-outlined">chevron_right</span></button>
      </div>
    </div>
    <div class="grid">
      <div class="dow">S</div><div class="dow">M</div><div class="dow">T</div><div class="dow">W</div><div class="dow">T</div><div class="dow">F</div><div class="dow">S</div>
      <div class="day dim">26</div><div class="day dim">27</div><div class="day dim">28</div><div class="day dim">29</div><div class="day dim">30</div><div class="day">1</div><div class="day">2</div>
      <div class="day">3</div><div class="day">4</div><div class="day">5</div><div class="day today">6</div><div class="day">7</div><div class="day">8</div><div class="day">9</div>
      <div class="day">10</div><div class="day">11</div><div class="day sel">12</div><div class="day">13</div><div class="day">14</div><div class="day">15</div><div class="day">16</div>
      <div class="day">17</div><div class="day">18</div><div class="day">19</div><div class="day">20</div><div class="day">21</div><div class="day">22</div><div class="day">23</div>
    </div>
  </div>
</body>
</html>
