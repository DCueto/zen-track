<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Dialog</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,400;8..144,500;8..144,700&display=swap">
<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 16px 20px; }
  .dlg {
    width: 360px;
    background: var(--md-sys-color-surface-container-high);
    color: var(--md-sys-color-on-surface);
    border-radius: var(--md-sys-shape-corner-extra-large);
    padding: 24px;
    box-shadow: var(--md-sys-elevation-level3);
  }
  .dlg .icon {
    display: flex; justify-content: center;
    color: var(--md-sys-color-secondary);
    margin-bottom: 16px;
  }
  .dlg .icon .material-symbols-outlined { font-size: 28px; }
  .dlg h3 {
    margin: 0 0 16px; text-align: center;
    font: 400 24px/2rem var(--md-ref-typeface-brand);
  }
  .dlg p {
    margin: 0 0 24px;
    font: 400 14px/1.25rem var(--md-ref-typeface-plain);
    color: var(--md-sys-color-on-surface-variant);
    letter-spacing: 0.25px;
  }
  .dlg .actions { display: flex; justify-content: flex-end; gap: 8px; }
  .dlg button {
    height: 40px; padding: 0 20px; border: none; cursor: pointer;
    background: transparent; color: var(--md-sys-color-primary);
    border-radius: var(--md-sys-shape-corner-full);
    font: 500 14px/1 var(--md-ref-typeface-plain); letter-spacing: 0.1px;
  }
</style>
</head>
<body>
  <div class="dlg">
    <div class="icon"><span class="material-symbols-outlined">delete</span></div>
    <h3>Delete this album?</h3>
    <p>4 photos will be permanently removed. This action can't be undone.</p>
    <div class="actions">
      <button>Cancel</button>
      <button>Delete</button>
    </div>
  </div>
</body>
</html>
