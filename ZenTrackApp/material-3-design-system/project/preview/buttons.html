<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px 20px; background: var(--md-sys-color-surface); color: var(--md-sys-color-on-surface); font-family: var(--md-ref-typeface-plain); }
  .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 12px; }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    height: 40px; padding: 0 24px; border: none; cursor: pointer;
    border-radius: var(--md-sys-shape-corner-full);
    font: var(--md-sys-typescale-label-large-weight) var(--md-sys-typescale-label-large-size)/var(--md-sys-typescale-label-large-line-height) var(--md-sys-typescale-label-large-font);
    letter-spacing: var(--md-sys-typescale-label-large-tracking);
    transition: box-shadow var(--md-sys-motion-duration-short3) var(--md-sys-motion-easing-standard);
  }
  .btn-filled   { background: var(--md-sys-color-primary); color: var(--md-sys-color-on-primary); }
  .btn-tonal    { background: var(--md-sys-color-secondary-container); color: var(--md-sys-color-on-secondary-container); }
  .btn-elevated { background: var(--md-sys-color-surface-container-low); color: var(--md-sys-color-primary); box-shadow: var(--md-sys-elevation-level1); }
  .btn-outlined { background: transparent; color: var(--md-sys-color-primary); border: 1px solid var(--md-sys-color-outline); }
  .btn-text     { background: transparent; color: var(--md-sys-color-primary); padding: 0 12px; }
  .lbl { width: 88px; font: 500 11px/1.1 var(--md-ref-typeface-plain); letter-spacing: 0.04em; text-transform: uppercase; color: var(--md-sys-color-on-surface-variant); }
</style>
</head>
<body>
  <div class="row"><span class="lbl">Filled</span><button class="btn btn-filled">Get started</button></div>
  <div class="row"><span class="lbl">Tonal</span><button class="btn btn-tonal">Tonal action</button></div>
  <div class="row"><span class="lbl">Elevated</span><button class="btn btn-elevated">Elevated</button></div>
  <div class="row"><span class="lbl">Outlined</span><button class="btn btn-outlined">Outlined</button></div>
  <div class="row"><span class="lbl">Text</span><button class="btn btn-text">Learn more</button></div>
</body>
</html>
