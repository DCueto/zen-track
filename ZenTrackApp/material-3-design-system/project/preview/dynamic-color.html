<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Dynamic color — seed picker</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,400;8..144,500;8..144,700&display=swap">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--preview-surface, #FEF7FF);
    color: var(--preview-on-surface, #1D1B20);
    font-family: var(--md-ref-typeface-plain);
    padding: 18px 20px;
    transition: background .3s, color .3s;
  }

  .toolbar {
    display: flex; flex-wrap: wrap; align-items: center; gap: 10px;
    margin-bottom: 18px;
  }
  .toolbar label { font: 500 11px/1 var(--md-ref-typeface-plain); letter-spacing:.04em; text-transform:uppercase; color: var(--preview-on-surface-variant, #49454F); }
  .seeds { display: flex; gap: 6px; flex-wrap: wrap; }
  .seed {
    width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
    border: 3px solid transparent; transition: transform .15s;
    flex: 0 0 auto;
  }
  .seed:hover { transform: scale(1.15); }
  .seed.on { border-color: var(--preview-on-surface, #1D1B20); }
  .seed-custom { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px dashed #999; overflow: hidden; position: relative; }
  .seed-custom input { position: absolute; inset: -4px; opacity: 0; cursor: pointer; width: 200%; height: 200%; }
  .dark-toggle {
    margin-left: auto; display: flex; align-items: center; gap: 8px;
    font: 500 12px/1 var(--md-ref-typeface-plain); color: var(--preview-on-surface-variant, #49454F);
  }
  .toggle-track {
    width: 40px; height: 24px; border-radius: 12px; cursor: pointer;
    background: var(--preview-outline, #79747E); position: relative; transition: background .2s;
  }
  .toggle-track.on { background: var(--preview-primary, #6750A4); }
  .toggle-thumb {
    position: absolute; top: 3px; left: 3px; width: 18px; height: 18px; border-radius: 50%;
    background: white; transition: transform .2s;
  }
  .toggle-track.on .toggle-thumb { transform: translateX(16px); }

  .roles {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 4px; margin-bottom: 14px;
  }
  .role {
    height: 56px; border-radius: 8px; display: flex; flex-direction: column; justify-content: flex-end; padding: 6px 8px;
    font: 500 9px/1 var(--md-ref-typeface-plain); letter-spacing: .03em; text-transform: uppercase;
    transition: background .3s, color .3s;
  }

  .components { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .btn {
    height: 40px; padding: 0 24px; border: none; cursor: pointer;
    border-radius: 9999px; font: 500 14px/1 var(--md-ref-typeface-plain);
    transition: background .3s, color .3s;
  }
  .card-demo {
    flex: 1; min-width: 180px; border-radius: 12px; padding: 14px 16px;
    transition: background .3s, color .3s;
  }
  .card-demo h4 { font: 500 16px/1.3 var(--md-ref-typeface-plain); margin-bottom: 6px; }
  .card-demo p { font: 400 13px/1.4 var(--md-ref-typeface-plain); }
</style>
</head>
<body>

<div class="toolbar">
  <label>Seed</label>
  <div class="seeds" id="seeds"></div>
  <div class="seed-custom" title="Custom color">
    <input type="color" id="custom-seed" value="#6750A4">
  </div>
  <div class="dark-toggle" id="dark-toggle">
    <span>Dark</span>
    <div class="toggle-track" id="toggle">
      <div class="toggle-thumb"></div>
    </div>
  </div>
</div>

<div class="roles" id="roles"></div>
<div class="components" id="components"></div>

<script>
// Inline HCT / scheme generator (simplified tonal palette — no npm dep)
// Uses oklch approximation to generate M3-like color roles from a seed hex
function hexToOklch(hex) {
  let r = parseInt(hex.slice(1,3),16)/255;
  let g = parseInt(hex.slice(3,5),16)/255;
  let b = parseInt(hex.slice(5,7),16)/255;
  // sRGB → linear
  r = r > 0.04045 ? Math.pow((r+0.055)/1.055, 2.4) : r/12.92;
  g = g > 0.04045 ? Math.pow((g+0.055)/1.055, 2.4) : g/12.92;
  b = b > 0.04045 ? Math.pow((b+0.055)/1.055, 2.4) : b/12.92;
  // linear sRGB → XYZ-D65
  const X = r*0.4124564 + g*0.3575761 + b*0.1804375;
  const Y = r*0.2126729 + g*0.7151522 + b*0.0721750;
  const Z = r*0.0193339 + g*0.1191920 + b*0.9503041;
  // XYZ → OKLab
  const l_ = Math.cbrt(0.8189330101*X + 0.3618667424*Y - 0.1288597137*Z);
  const m_ = Math.cbrt(0.0329845436*X + 0.9293118715*Y + 0.0361456387*Z);
  const s_ = Math.cbrt(0.0482003018*X + 0.2643662691*Y + 0.6338517070*Z);
  const L  = 0.2104542553*l_ + 0.7936177850*m_ - 0.0040720468*s_;
  const a  = 1.9779984951*l_ - 2.4285922050*m_ + 0.4505937099*s_;
  const bv = 0.0259040371*l_ + 0.7827717662*m_ - 0.8086757660*s_;
  const C = Math.sqrt(a*a + bv*bv);
  const h = Math.atan2(bv, a) * 180 / Math.PI;
  return { L, C, h: h < 0 ? h+360 : h };
}

function oklchToHex(L, C, h) {
  const hr = h * Math.PI / 180;
  const a = C * Math.cos(hr);
  const b = C * Math.sin(hr);
  const l_ = L + 0.3963377774*a + 0.2158037573*b;
  const m_ = L - 0.1055613458*a - 0.0638541728*b;
  const s_ = L - 0.0894841775*a - 1.2914855480*b;
  const l3=l_*l_*l_, m3=m_*m_*m_, s3=s_*s_*s_;
  let r =  4.0767416621*l3 - 3.3077115913*m3 + 0.2309699292*s3;
  let g = -1.2684380046*l3 + 2.6097574011*m3 - 0.3413193965*s3;
  let bv = -0.0041960863*l3 - 0.7034186147*m3 + 1.7076147010*s3;
  r = r > 0.0031308 ? 1.055*Math.pow(Math.max(0,r),1/2.4)-0.055 : 12.92*r;
  g = g > 0.0031308 ? 1.055*Math.pow(Math.max(0,g),1/2.4)-0.055 : 12.92*g;
  bv= bv> 0.0031308 ? 1.055*Math.pow(Math.max(0,bv),1/2.4)-0.055 : 12.92*bv;
  const ri = Math.max(0,Math.min(255,Math.round(r*255)));
  const gi = Math.max(0,Math.min(255,Math.round(g*255)));
  const bi = Math.max(0,Math.min(255,Math.round(bv*255)));
  return '#' + [ri,gi,bi].map(x=>x.toString(16).padStart(2,'0')).join('');
}

function scheme(seedHex, dark) {
  const { L, C, h } = hexToOklch(seedHex);
  // Secondary: +60° hue; Tertiary: +120°; Neutral: desaturate
  const secH = (h + 60) % 360;
  const terH = (h + 120) % 360;

  const t = (l, c, hue) => oklchToHex(l, c, hue);
  if (!dark) return {
    primary:                  t(0.42, Math.min(C,0.18), h),
    onPrimary:                t(0.99, 0.01, h),
    primaryContainer:         t(0.92, Math.min(C*0.5,0.08), h),
    onPrimaryContainer:       t(0.18, Math.min(C,0.15), h),
    secondary:                t(0.42, Math.min(C*0.6,0.10), secH),
    onSecondary:              t(0.99, 0.01, secH),
    secondaryContainer:       t(0.92, Math.min(C*0.3,0.06), secH),
    onSecondaryContainer:     t(0.18, 0.05, secH),
    tertiary:                 t(0.42, Math.min(C*0.6,0.10), terH),
    onTertiary:               t(0.99, 0.01, terH),
    tertiaryContainer:        t(0.92, Math.min(C*0.3,0.06), terH),
    onTertiaryContainer:      t(0.18, 0.05, terH),
    error:                    '#B3261E',
    onError:                  '#FFFFFF',
    errorContainer:           '#F9DEDC',
    onErrorContainer:         '#410E0B',
    surface:                  t(0.99, 0.005, h),
    onSurface:                t(0.12, 0.008, h),
    onSurfaceVariant:         t(0.38, 0.01, h),
    surfaceContainer:         t(0.94, 0.008, h),
    surfaceContainerHigh:     t(0.90, 0.008, h),
    outline:                  t(0.55, 0.01, h),
    outlineVariant:           t(0.82, 0.008, h),
    inverseSurface:           t(0.22, 0.01, h),
    inverseOnSurface:         t(0.96, 0.005, h),
    inversePrimary:           t(0.82, Math.min(C*0.5,0.14), h),
  };
  else return {
    primary:                  t(0.82, Math.min(C*0.5,0.14), h),
    onPrimary:                t(0.22, Math.min(C,0.18), h),
    primaryContainer:         t(0.32, Math.min(C*0.6,0.12), h),
    onPrimaryContainer:       t(0.92, Math.min(C*0.3,0.08), h),
    secondary:                t(0.78, Math.min(C*0.4,0.09), secH),
    onSecondary:              t(0.22, 0.05, secH),
    secondaryContainer:       t(0.32, 0.05, secH),
    onSecondaryContainer:     t(0.92, 0.04, secH),
    tertiary:                 t(0.78, Math.min(C*0.4,0.09), terH),
    onTertiary:               t(0.22, 0.05, terH),
    tertiaryContainer:        t(0.32, 0.05, terH),
    onTertiaryContainer:      t(0.92, 0.04, terH),
    error:                    '#F2B8B5',
    onError:                  '#601410',
    errorContainer:           '#8C1D18',
    onErrorContainer:         '#F9DEDC',
    surface:                  t(0.10, 0.008, h),
    onSurface:                t(0.92, 0.008, h),
    onSurfaceVariant:         t(0.78, 0.01, h),
    surfaceContainer:         t(0.16, 0.008, h),
    surfaceContainerHigh:     t(0.20, 0.008, h),
    outline:                  t(0.62, 0.012, h),
    outlineVariant:           t(0.32, 0.008, h),
    inverseSurface:           t(0.92, 0.008, h),
    inverseOnSurface:         t(0.22, 0.01, h),
    inversePrimary:           t(0.42, Math.min(C,0.18), h),
  };
}

const SEEDS = [
  { hex: '#6750A4', label: 'Purple' },
  { hex: '#1A73E8', label: 'Blue' },
  { hex: '#0B8043', label: 'Green' },
  { hex: '#E37400', label: 'Orange' },
  { hex: '#C5221F', label: 'Red' },
  { hex: '#006399', label: 'Teal' },
  { hex: '#7B4F97', label: 'Violet' },
  { hex: '#5C7C3F', label: 'Sage' },
];

const ROLES = [
  ['primary','onPrimary'],['primaryContainer','onPrimaryContainer'],
  ['secondary','onSecondary'],['secondaryContainer','onSecondaryContainer'],
  ['tertiary','onTertiary'],['tertiaryContainer','onTertiaryContainer'],
  ['error','onError'],['errorContainer','onErrorContainer'],
  ['surface','onSurface'],['surfaceContainer','onSurface'],
  ['surfaceContainerHigh','onSurface'],['outline','surface'],
];

let currentSeed = '#6750A4';
let dark = false;

function apply() {
  const s = scheme(currentSeed, dark);
  // Set preview vars
  document.body.style.setProperty('--preview-surface', s.surface);
  document.body.style.setProperty('--preview-on-surface', s.onSurface);
  document.body.style.setProperty('--preview-on-surface-variant', s.onSurfaceVariant);
  document.body.style.setProperty('--preview-primary', s.primary);
  document.body.style.setProperty('--preview-outline', s.outline);
  document.body.style.background = s.surface;
  document.body.style.color = s.onSurface;

  // Roles
  const rolesEl = document.getElementById('roles');
  rolesEl.innerHTML = ROLES.map(([bg, fg]) => `
    <div class="role" style="background:${s[bg]};color:${s[fg]};">${bg}</div>
  `).join('');

  // Components
  document.getElementById('components').innerHTML = `
    <button class="btn" style="background:${s.primary};color:${s.onPrimary};">Filled</button>
    <button class="btn" style="background:${s.secondaryContainer};color:${s.onSecondaryContainer};">Tonal</button>
    <button class="btn" style="background:transparent;color:${s.primary};box-shadow:inset 0 0 0 1px ${s.outline};">Outlined</button>
    <button class="btn" style="background:transparent;color:${s.primary};">Text</button>
    <div class="card-demo" style="background:${s.surfaceContainer};color:${s.onSurface};">
      <h4>Filled card</h4><p style="color:${s.onSurfaceVariant}">Surface container with on-surface text</p>
    </div>
    <div class="card-demo" style="background:${s.primaryContainer};color:${s.onPrimaryContainer};">
      <h4>Primary container</h4><p>Accent card variant</p>
    </div>
  `;
  // Toggle visual
  const track = document.getElementById('toggle');
  track.className = 'toggle-track' + (dark ? ' on' : '');
}

// Build seed swatches
const container = document.getElementById('seeds');
SEEDS.forEach(({hex, label}) => {
  const el = document.createElement('div');
  el.className = 'seed' + (hex === currentSeed ? ' on' : '');
  el.style.background = hex;
  el.title = label;
  el.onclick = () => {
    currentSeed = hex;
    document.querySelectorAll('.seed').forEach(s => s.classList.remove('on'));
    el.classList.add('on');
    apply();
  };
  container.appendChild(el);
});

document.getElementById('custom-seed').addEventListener('input', e => {
  currentSeed = e.target.value;
  document.querySelectorAll('.seed').forEach(s => s.classList.remove('on'));
  apply();
});

document.getElementById('toggle').addEventListener('click', () => {
  dark = !dark; apply();
});

apply();
</script>
</body>
</html>
