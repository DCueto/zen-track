services:
  postgres:
    image: postgres:17
    container_name: zentrack_postgres
    environment:
      POSTGRES_DB: zentrack_db
      POSTGRES_USER: zentrack
      POSTGRES_PASSWORD: zentrack_dev
    ports:
      - "5433:5432"
    volumes:
      - zentrack_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zentrack -d zentrack_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  zentrack_postgres_data:
